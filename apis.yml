description: >-
  CenterPoint Energy is a domestic energy delivery company that provides
  electric transmission and distribution, natural gas distribution, and
  energy services operations serving residential, commercial, and industrial
  customers across multiple U.S. states. Developer-facing interfaces include
  the Smart Meter Texas (SMT) Usage History Inquiry API, Green Button Connect
  My Data exports for authorized third-party access to customer interval
  usage, and the Centerpoint Connect service API at
  api-portal.centerpointconnect.io used by contractor and field-service
  integrations.
apis:
  - aid: centerpoint-energy:usage-history-inquiry
    name: CenterPoint Energy Usage History Inquiry API
    tags:
      - Billing History
      - Interval Data
      - Smart Meter Texas
      - Usage
    humanURL: https://www.smartmetertexas.com/
    properties:
      - url: https://www.smartmetertexas.com/
        type: Website
      - url: https://www.smartmetertexas.com/home
        type: Documentation
      - url: https://www.smartmetertexas.com/developers
        type: Developer
    description: >-
      Automated access to residential and commercial billing history and
      electricity usage as measured by CenterPoint's Interval Data Recorders
      (IDRs), exposed through the Smart Meter Texas platform that CenterPoint
      participates in as a Texas Transmission and Distribution Service
      Provider. Intended for third-party information providers acting on
      customer authorization with API methods for account validation,
      provider account management, and retrieval of interval usage.
  - aid: centerpoint-energy:green-button-connect-my-data
    name: CenterPoint Energy Green Button Connect My Data
    tags:
      - Energy Usage
      - Green Button
      - Interval Data
      - Open Data
    humanURL: https://www.energy.gov/data/green-button
    properties:
      - url: https://www.energy.gov/data/green-button
        type: Website
      - url: https://www.greenbuttonalliance.org/
        type: Alliance
      - url: https://www.naesb.org/ESPI_Standards.asp
        type: Specification
    description: >-
      CenterPoint Energy has committed to the Green Button initiative,
      providing customers and authorized third parties with secure download
      and Connect My Data API access to detailed interval energy usage in
      the NAESB ESPI (Energy Services Provider Interface) standard XML /
      Atom format.
  - aid: centerpoint-energy:centerpoint-connect-services-api
    name: Centerpoint Connect Services API
    tags:
      - Field Service
      - Integration
      - Partner
    humanURL: https://api-portal.centerpointconnect.io/
    properties:
      - url: https://api-portal.centerpointconnect.io/
        type: Developer
      - url: https://centerpointconnect.zendesk.com/hc/en-us/sections/16652143336855-API-Integrations
        type: Documentation
    description: >-
      The Centerpoint API Developer Portal publishes Services API references,
      examples, and troubleshooting for partners integrating with the
      Centerpoint Connect field-service and workflow platform used by
      contractor teams, including Automated Leads integrations and webhook
      flows.
